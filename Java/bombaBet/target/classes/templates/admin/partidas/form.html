<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Partida | BombaBet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">

    <div class="mb-4">
        <h1 class="fw-bold"
            th:text="${partida.id == null ? 'Nova partida' : 'Editar partida'}">
            Nova partida
        </h1>

        <p class="text-muted">
            Preencha os dados da partida.
        </p>
    </div>

    <div th:if="${erro}"
         class="alert alert-danger"
         th:text="${erro}">
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">

            <form th:action="${partida.id == null}
                             ? @{/admin/partidas}
                             : @{/admin/partidas/{id}/editar(id=${partida.id})}"
                  method="post">

                <div class="row g-3">

                    <div class="col-12 col-md-6">
                        <label class="form-label">
                            Seleção Casa
                        </label>

                        <select name="selecaoCasaId"
                                class="form-select"
                                required>

                            <option value="">
                                Selecione
                            </option>

                            <option th:each="selecao : ${selecoes}"
                                    th:value="${selecao.id}"
                                    th:text="${selecao.nome}"
                                    th:selected="${partida.selecaoCasa != null and partida.selecaoCasa.id == selecao.id}">
                                Brasil
                            </option>

                        </select>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">
                            Seleção Visitante
                        </label>

                        <select name="selecaoVisitanteId"
                                class="form-select"
                                required>

                            <option value="">
                                Selecione
                            </option>

                            <option th:each="selecao : ${selecoes}"
                                    th:value="${selecao.id}"
                                    th:text="${selecao.nome}"
                                    th:selected="${partida.selecaoVisitante != null and partida.selecaoVisitante.id == selecao.id}">
                                Argentina
                            </option>

                        </select>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">
                            Data/Hora
                        </label>

                        <input type="datetime-local"
                               name="dataHora"
                               class="form-control"
                               th:value="${partida.dataHora != null ? #temporals.format(partida.dataHora,'yyyy-MM-dd''T''HH:mm') : ''}"
                               required>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">
                            Estádio
                        </label>

                        <input type="text"
                               name="estadio"
                               class="form-control"
                               th:value="${partida.estadio}"
                               placeholder="Ex: Estádio Nacional"
                               required>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">
                            Fase
                        </label>

                        <select name="fase"
                                class="form-select"
                                required>

                            <option value="">
                                Selecione
                            </option>

                            <option value="GRUPOS"
                                    th:selected="${partida.fase == 'GRUPOS'}">
                                GRUPOS
                            </option>

                            <option value="OITAVAS_DE_FINAL"
                                    th:selected="${partida.fase == 'OITAVAS_DE_FINAL'}">
                                OITAVAS DE FINAL
                            </option>

                            <option value="QUARTAS_DE_FINAL"
                                    th:selected="${partida.fase == 'QUARTAS_DE_FINAL'}">
                                QUARTAS DE FINAL
                            </option>

                            <option value="SEMIFINAL"
                                    th:selected="${partida.fase == 'SEMIFINAL'}">
                                SEMIFINAL
                            </option>

                            <option value="DISPUTA_TERCEIRO_LUGAR"
                                    th:selected="${partida.fase == 'DISPUTA_TERCEIRO_LUGAR'}">
                                DISPUTA TERCEIRO LUGAR
                            </option>

                            <option value="FINAL"
                                    th:selected="${partida.fase == 'FINAL'}">
                                FINAL
                            </option>

                        </select>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">
                            Grupo
                        </label>

                        <input type="text"
                               name="grupo"
                               class="form-control"
                               maxlength="1"
                               th:value="${partida.grupo}"
                               placeholder="Ex: A">
                    </div>

                </div>

                <div class="d-flex gap-2 mt-4">

                    <button type="submit"
                            class="btn btn-primary">
                        Salvar
                    </button>

                    <a th:href="@{/admin/partidas}"
                       class="btn btn-outline-secondary">
                        Voltar
                    </a>

                </div>

            </form>

        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
