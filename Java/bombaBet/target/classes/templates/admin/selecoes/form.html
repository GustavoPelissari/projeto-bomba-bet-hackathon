<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Seleção | BombaBet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">

    <div class="mb-4">
        <h1 class="fw-bold"
            th:text="${selecao.id == null ? 'Nova seleção' : 'Editar seleção'}">
            Nova seleção
        </h1>

        <p class="text-muted">
            Preencha os dados da seleção.
        </p>
    </div>

    <div th:if="${erro}"
         class="alert alert-danger"
         th:text="${erro}">
    </div>

    <div class="card border-0 shadow-sm">

        <div class="card-body">

            <form th:action="${selecao.id == null}
                            ? @{/admin/selecoes}
                            : @{/admin/selecoes/{id}/editar(id=${selecao.id})}"
                  th:object="${selecao}"
                  method="post">

                <div class="mb-3">

                    <label class="form-label">
                        Nome
                    </label>

                    <input type="text"
                           th:field="*{nome}"
                           class="form-control"
                           placeholder="Ex: Brasil"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Código FIFA
                    </label>

                    <input type="text"
                           th:field="*{codigoFifa}"
                           class="form-control"
                           placeholder="Ex: BRA"
                           maxlength="3"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Grupo
                    </label>

                    <input type="text"
                           th:field="*{grupo}"
                           class="form-control"
                           placeholder="Ex: A"
                           maxlength="1"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Bandeira/Escudo
                    </label>

                    <input type="text"
                           th:field="*{bandeira}"
                           class="form-control"
                           placeholder="Ex: brasil.png">

                </div>

                <div class="d-flex gap-2">

                    <button type="submit"
                            class="btn btn-primary">
                        Salvar
                    </button>

                    <a th:href="@{/admin/selecoes}"
                       class="btn btn-outline-secondary">
                        Voltar
                    </a>

                </div>

            </form>

        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
