<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Seleções | BombaBet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar-admin :: navbar}"></div>

<main class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold mb-1">Seleções</h1>
            <p class="text-muted mb-0">
                Cadastre, edite e remova seleções da Copa.
            </p>
        </div>

        <a th:href="@{/admin/selecoes/nova}" class="btn btn-primary">
            Nova seleção
        </a>
    </div>

    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <form th:action="@{/admin/selecoes}" method="get" class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-2">
                <div class="col-12 col-md-10">
                    <input type="text"
                           name="nome"
                           class="form-control"
                           placeholder="Buscar por nome da seleção"
                           th:value="${nome}">
                </div>

                <div class="col-12 col-md-2">
                    <button type="submit" class="btn btn-outline-primary w-100">
                        Buscar
                    </button>
                </div>
            </div>
        </div>
    </form>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Código FIFA</th>
                    <th>Grupo</th>
                    <th>Bandeira/Escudo</th>
                    <th class="text-end">Ações</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="selecao : ${selecoes}">
                    <td th:text="${selecao.id}">1</td>
                    <td th:text="${selecao.nome}">Brasil</td>
                    <td th:text="${selecao.codigoFifa}">BRA</td>
                    <td th:text="${selecao.grupo}">G</td>
                    <td th:text="${selecao.bandeira}">brasil.png</td>

                    <td class="text-end">
                        <a th:href="@{/admin/selecoes/{id}/editar(id=${selecao.id})}"
                           class="btn btn-sm btn-outline-primary">
                            Editar
                        </a>

                        <form th:action="@{/admin/selecoes/{id}/excluir(id=${selecao.id})}"
                              method="post"
                              class="d-inline">

                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}">

                            <button type="submit"
                                    class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Deseja remover esta seleção?')">
                                Remover
                            </button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(selecoes)}">
                    <td colspan="6" class="text-center text-muted py-4">
                        Nenhuma seleção cadastrada.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
