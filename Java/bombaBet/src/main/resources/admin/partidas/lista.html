<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Partidas | BombaBet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar-admin :: navbar}"></div>

<main class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold mb-1">Partidas</h1>
            <p class="text-muted mb-0">
                Cadastre, edite, remova e lance resultados das partidas.
            </p>
        </div>

        <a th:href="@{/admin/partidas/nova}" class="btn btn-primary">
            Nova partida
        </a>
    </div>

    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Partida</th>
                    <th>Data/Hora</th>
                    <th>Fase</th>
                    <th>Grupo</th>
                    <th>Estádio</th>
                    <th>Status</th>
                    <th>Resultado</th>
                    <th class="text-end">Ações</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="partida : ${partidas}">
                    <td th:text="${partida.id}">1</td>

                    <td>
                        <span th:text="${partida.selecaoCasa.nome}">Brasil</span>
                        x
                        <span th:text="${partida.selecaoVisitante.nome}">Argentina</span>
                    </td>

                    <td th:text="${#temporals.format(partida.dataHora, 'dd/MM/yyyy HH:mm')}">
                        20/06/2026 16:00
                    </td>

                    <td th:text="${partida.fase}">GRUPOS</td>
                    <td th:text="${partida.grupo}">G</td>
                    <td th:text="${partida.estadio}">Estádio</td>

                    <td>
                        <span class="badge bg-primary" th:text="${partida.status}">
                            AGENDADA
                        </span>
                    </td>

                    <td>
                        <span th:if="${partida.golsCasa != null}">
                            <span th:text="${partida.golsCasa}">2</span>
                            x
                            <span th:text="${partida.golsVisitante}">1</span>
                        </span>

                        <span th:if="${partida.golsCasa == null}" class="text-muted">
                            Pendente
                        </span>
                    </td>

                    <td class="text-end">

                        <a th:href="@{/admin/partidas/{id}/resultado(id=${partida.id})}"
                           class="btn btn-sm btn-outline-success">
                            Resultado
                        </a>

                        <a th:href="@{/admin/partidas/{id}/editar(id=${partida.id})}"
                           class="btn btn-sm btn-outline-primary">
                            Editar
                        </a>

                        <form th:action="@{/admin/partidas/{id}/excluir(id=${partida.id})}"
                              method="post"
                              class="d-inline">

                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}">

                            <button type="submit"
                                    class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Deseja remover esta partida?')">
                                Remover
                            </button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(partidas)}">
                    <td colspan="9" class="text-center text-muted py-4">
                        Nenhuma partida cadastrada.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
