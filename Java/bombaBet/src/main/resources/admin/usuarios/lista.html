<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuários | BombaBet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar-admin :: navbar}"></div>

<main class="container py-4">

    <div class="mb-4">
        <h1 class="fw-bold mb-1">Usuários</h1>
        <p class="text-muted mb-0">
            Liste, busque, bloqueie e desbloqueie usuários cadastrados.
        </p>
    </div>

    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <form th:action="@{/admin/usuarios}" method="get" class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-2">
                <div class="col-12 col-md-10">
                    <input type="text"
                           name="termo"
                           class="form-control"
                           placeholder="Buscar por nome ou e-mail"
                           th:value="${termo}">
                </div>

                <div class="col-12 col-md-2">
                    <button type="submit" class="btn btn-outline-primary w-100">
                        Buscar
                    </button>
                </div>
            </div>
        </div>
    </form>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Perfil</th>
                    <th>Ativo</th>
                    <th>Bloqueado</th>
                    <th>Pontos</th>
                    <th>Placar Exato</th>
                    <th class="text-end">Ações</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="usuario : ${usuarios}">
                    <td th:text="${usuario.id}">1</td>
                    <td th:text="${usuario.nome}">Leonardo</td>
                    <td th:text="${usuario.email}">email@email.com</td>

                    <td>
                        <span class="badge bg-dark" th:text="${usuario.privilegio}">
                            USER
                        </span>
                    </td>

                    <td>
                        <span th:if="${usuario.ativo}" class="badge bg-success">
                            Sim
                        </span>

                        <span th:if="${!usuario.ativo}" class="badge bg-secondary">
                            Não
                        </span>
                    </td>

                    <td>
                        <span th:if="${usuario.bloqueado}" class="badge bg-danger">
                            Sim
                        </span>

                        <span th:if="${!usuario.bloqueado}" class="badge bg-success">
                            Não
                        </span>
                    </td>

                    <td th:text="${usuario.pontuacaoTotal}">0</td>
                    <td th:text="${usuario.placaresExatos}">0</td>

                    <td class="text-end">

                        <form th:if="${!usuario.bloqueado}"
                              th:action="@{/admin/usuarios/{id}/bloquear(id=${usuario.id})}"
                              method="post"
                              class="d-inline">

                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}">

                            <button type="submit"
                                    class="btn btn-sm btn-outline-danger">
                                Bloquear
                            </button>
                        </form>

                        <form th:if="${usuario.bloqueado}"
                              th:action="@{/admin/usuarios/{id}/desbloquear(id=${usuario.id})}"
                              method="post"
                              class="d-inline">

                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}">

                            <button type="submit"
                                    class="btn btn-sm btn-outline-success">
                                Desbloquear
                            </button>
                        </form>

                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(usuarios)}">
                    <td colspan="9" class="text-center text-muted py-4">
                        Nenhum usuário encontrado.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
