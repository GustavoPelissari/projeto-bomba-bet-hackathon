<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resultado | BombaBet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar}"></div>

<main class="container py-4">

    <div class="mb-4">
        <h1 class="fw-bold">Lançar/Editar Resultado</h1>
        <p class="text-muted">
            Ao salvar o resultado, o sistema recalcula automaticamente os pontos dos palpites.
        </p>
    </div>

    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">

            <div class="alert alert-info">
                <strong th:text="${partida.selecaoCasa.nome}">Brasil</strong>
                x
                <strong th:text="${partida.selecaoVisitante.nome}">Argentina</strong>
                -
                <span th:text="${#temporals.format(partida.dataHora, 'dd/MM/yyyy HH:mm')}">
                    20/06/2026 16:00
                </span>
            </div>

            <form th:action="@{/admin/partidas/{id}/resultado(id=${partida.id})}"
                  method="post">

                <input type="hidden"
                       th:name="${.parameterName}"
                       th:value="${.token}">

                <div class="row g-3">

                    <div class="col-12 col-md-6">
                        <label class="form-label">
                            Gols -
                            <span th:text="${partida.selecaoCasa.nome}">Brasil</span>
                        </label>

                        <input type="number"
                               name="golsCasa"
                               class="form-control"
                               min="0"
                               th:value="${partida.golsCasa}"
                               required>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">
                            Gols -
                            <span th:text="${partida.selecaoVisitante.nome}">Argentina</span>
                        </label>

                        <input type="number"
                               name="golsVisitante"
                               class="form-control"
                               min="0"
                               th:value="${partida.golsVisitante}"
                               required>
                    </div>

                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-success">
                        Salvar resultado
                    </button>

                    <a th:href="@{/admin/partidas}" class="btn btn-outline-secondary">
                        Voltar
                    </a>
                </div>

            </form>

        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
